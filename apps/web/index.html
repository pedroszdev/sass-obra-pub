<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Favicon: o SVG é o que os navegadores atuais usam; o .ico atende os
         antigos e quem busca /favicon.ico às cegas (crawler, preview de link).
         Os dois saem de brand/prumolicita-simbolo.svg — o .ico via
         `python3 brand/gerar-favicon.py`. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#C25A26" />
    <meta name="description" content="PrumoLicita — acha a obra pública certa, diz se você está apto a ganhar e tira o jurídico do edital da frente." />
    <!-- PNG, não SVG: o Safari IGNORA apple-touch-icon em SVG e usa um print da
         página no lugar. Apontava para o .svg e o ícone do iOS não funcionava. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PrumoLicita" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    />
    <title>PrumoLicita — Editais de obra pública</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
